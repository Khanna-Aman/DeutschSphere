name: Validate data integrity

# Guards the invariants the codebase audit found unprotected: word counts,
# image references, and doc/data consistency. Runs on every push and PR that
# touches the data, the docs that quote counts, or the validator itself.
on:
  push:
    branches: [main]
    paths:
      - "a1/wordlist.json"
      - "a2/wordlist.json"
      - "b1/wordlist.json"
      - "README.md"
      - "index.html"
      - "manifest.json"
      - "VISION.md"
      - "scripts/validate_data.py"
      - "scripts/check_example_originality.py"
      - "scripts/originality_fingerprint.json"
      - ".github/workflows/validate-data.yml"
  pull_request:
    paths:
      - "a1/wordlist.json"
      - "a2/wordlist.json"
      - "b1/wordlist.json"
      - "README.md"
      - "index.html"
      - "manifest.json"
      - "VISION.md"
      - "scripts/validate_data.py"
      - "scripts/check_example_originality.py"
      - "scripts/originality_fingerprint.json"
      - ".github/workflows/validate-data.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate wordlist data integrity
        # Validates JSON, schema, unique ids, image references (exist + no
        # duplicates), and doc/data count consistency.
        run: python scripts/validate_data.py

      - name: Guard example-sentence originality (copyright)
        # Hard-fails if any example_de reproduces a verbatim (>=7-word) sentence
        # from the copyrighted Goethe/Hueber/telc/OeSD Wortliste. The source PDFs
        # are git-ignored, so CI checks against a committed, non-copyrighted
        # fingerprint (salted hashes of the official 6-word shingles). Regenerate
        # locally with: python scripts/check_example_originality.py --build-fingerprint
        # scripts/originality_fingerprint.json
        run: python scripts/check_example_originality.py --fingerprint scripts/originality_fingerprint.json
