name: quality

# Accessibility / best-practices / SEO / performance gate.
# Runs Lighthouse (which uses axe-core for accessibility) against the static
# site on every push to main and every PR. a11y/best-practices/seo are hard
# gates; performance is advisory (see lighthouserc.json for why).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false
